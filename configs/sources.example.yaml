sources:
  - name: people_env
    source_type: news
    domain: env.people.com.cn
    region_level: national
    category: environment
    enabled: true
    seed_urls:
      - https://env.people.com.cn/GB/193600/
    list_selector: "a"
    title_selector: "h1"
    content_selector: ".rm_txt_con, .box_con, .content, body"
    publish_time_selector: ".box01 span, .pub_time, time"
    channel: "people_env"

  - name: xinhuanet_environment
    source_type: news
    domain: www.xinhuanet.com
    region_level: national
    category: environment
    enabled: true
    seed_urls:
      - https://www.xinhuanet.com/environment/top.htm
    list_selector: "a"
    title_selector: "h1"
    content_selector: ".article, #detail, .content, body"
    publish_time_selector: ".h-time, .pubTime, time"
    channel: "xinhuanet_environment"

  - name: gov_notice
    source_type: government
    domain: sthjt.hunan.gov.cn
    region_level: provincial
    category: ecology
    enabled: true
    seed_urls:
      - http://sthjt.hunan.gov.cn/sthjt/xxgk/gzdt/
    list_selector: "a"
    title_selector: "h1"
    content_selector: ".TRS_Editor, .content, .article, body"
    publish_time_selector: ".time, .pub-time, time"
    channel: "gov_notice"
